name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test KMP modules
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
          cache: gradle

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Run behavioural test suites
        run: |
          ./gradlew \
            :kvs-core:allTests \
            :kvs-persistence-light:allTests \
            :kvs-document:allTests \
            :kvs-persistence-optimized:allTests \
            --no-daemon
